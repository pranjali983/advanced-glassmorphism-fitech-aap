<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Wallet Aap</title>
    <style>
        :root {
            --accent: #00f2fe;
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #0f172a;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* The App Container */
        .app-shell {
            width: 380px;
            height: 700px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .balance-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px;
            border-radius: 25px;
            margin-top: 20px;
            color: #000;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
        }

        /* Hard CSS: Mini Sparkline Chart */
        .chart-container {
            height: 120px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin: 30px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bar {
            flex: 1;
            background: var(--accent);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s ease;
        }

        .transaction-list {
            flex: 1;
            overflow-y: auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .status-up { color: #4ade80; }
        .status-down { color: #f87171; }

        .btn-trade {
            background: white;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <span>9:41</span>
            <span style="font-weight:bold">QuantumPay</span>
            <span>🔋</span>
        </header>

        <div class="balance-card">
            <p style="margin:0; opacity:0.8">Total Portfolio</p>
            <div class="balance-amount" id="main-balance">$12,840.50</div>
            <small>+ 4.2% today</small>
        </div>

        <div class="chart-container" id="chart">
            </div>

        <div class="transaction-list">
            <div class="item">
                <div><strong>Bitcoin</strong><br><small>BTC/USD</small></div>
                <div class="status-up">+$420.00</div>
            </div>
            <div class="item">
                <div><strong>Ethereum</strong><br><small>ETH/USD</small></div>
                <div class="status-down">-$12.40</div>
            </div>
            <div class="item">
                <div><strong>Solana</strong><br><small>SOL/USD</small></div>
                <div class="status-up">+$88.10</div>
            </div>
        </div>

        <button class="btn-trade" onclick="refreshData()">Refresh Market</button>
    </div>

    <script>
        // Generate random bars for the "Hard" CSS chart
        function generateChart() {
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            for(let i=0; i<12; i++) {
                const height = Math.floor(Math.random() * 80) + 20;
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = height + '%';
                chart.appendChild(bar);
            }
        }

        function refreshData() {
            // Simulate balance update
            const balance = document.getElementById('main-balance');
            const newTotal = (Math.random() * 5000 + 10000).toLocaleString();
            balance.innerText = `$${newTotal}`;
            generateChart();
        }

        // Initialize
        generateChart();
    </script>
</body>
</html>
